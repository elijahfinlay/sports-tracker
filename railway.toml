# Railway service config — see https://docs.railway.com/reference/config-as-code
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Single persistent volume holds the SQLite DB, sessions, and MMS photos.
# Mount it at /data, then set DATABASE_PATH=/data/sports.db and UPLOAD_DIR=/data/uploads
# (configure those env vars in the Railway dashboard or via `railway variables`).
